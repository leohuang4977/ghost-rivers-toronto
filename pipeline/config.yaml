# Ghost Rivers of Toronto — Phase 1 pipeline configuration
# Every path is relative to the pipeline/ directory. No hard-coded paths in code;
# tune the pipeline here, re-run `pixi run all`, and the two PMTiles rebuild.

# Downtown v1 study area — the Garrison + Taddle corridor (same bbox as the DTM pull).
study_area:
  bbox_wgs84: [-79.458, 43.625, -79.352, 43.706]   # [min_lon, min_lat, max_lon, max_lat]

crs:
  vector_out: "EPSG:4326"   # creek vectors for MapLibre/tippecanoe
  web:        "EPSG:3857"   # raster tiles (Web Mercator)
  dtm:        "EPSG:2958"   # DTM horizontal CRS, forced 2D (source is compound 3D)

# ── Creek geometry + timeline ────────────────────────────────────────────────
creeks:
  # Primary geometry AND "year last seen" source. We use the LATEST revision of the
  # "best interpreted lost rivers" layer inside the Borealis geodatabase rather than
  # the published May-2017 shapefile: same lineage, but far richer/cleaner dates.
  # (See the Phase-1 report for the coverage comparison that justifies this.)
  source_gdb:   "data/raw/disappearing_rivers/LR_Toronto_Composite.gdb"
  source_layer: "BI_Lost_Rivers_20170705"
  # The published shapefile, kept only for the coverage comparison in the report.
  canonical_shp: "data/raw/disappearing_rivers/BestInterpretedLostRIversMay12_2017.zip"
  # Authoritative "year the river was last drawn on a map". 0 means "no year".
  year_field: "lastNTS"
  year_nodata: [0]
  # HERO selection: the source has no creek names, so we tag the connected creek
  # network that contains this seed point as the protagonist (hero=1). The seed is
  # the buried Crawford St bridge in Trinity Bellwoods — definitively on Garrison.
  hero_seed_lonlat: [-79.4137, 43.6472]

# ── DTM mosaic / hillshade ───────────────────────────────────────────────────
dtm:
  tiles_glob: "data/raw/lidar_dtm/*.tif"
  # Tiles carry INCONSISTENT nodata (+/-3.4e38); we rely on each tile's own header
  # nodata during warp (gdalwarp masks per-source) and write one clean value out.
  out_nodata: -9999.0
  # The "DTM" still carries building-removal pads / rail cuts / block edges that read
  # as urban clutter. Now that streets + parks carry the "city" story, the terrain is
  # just quiet background texture, so we smooth HARD (8 m area-average) to dissolve the
  # urban grid entirely; only broad valleys + surviving ravines should remain.
  target_res_m: 8.0
  resampling: "average"      # area-average smoothing (NOT bilinear) to suppress clutter

hillshade:
  z_factor: 1.8              # gentle relief — soft, low-contrast background, not a topo readout
  multidirectional: false    # single low sun = sculptural shadows, moodier than flat multi-dir
  azimuth: 315               # NW light
  altitude: 45
  margin_m: 300              # buffer the study bbox before hillshading to avoid edge seams

# ── City context layers (streets / parks / ravines / water) ──────────────────
city:
  # Toronto Centreline (streets). Whitelist the road classes; drop trails, rivers,
  # rail, hydro, shoreline, walkways so it's just the street grid.
  centreline: "data/raw/city_open_data/centreline/Centreline - Version 2 - 4326.geojson"
  street_classes:
    - "Local"
    - "Collector"
    - "Collector Ramp"
    - "Major Arterial"
    - "Major Arterial Ramp"
    - "Minor Arterial"
    - "Minor Arterial Ramp"
    - "Expressway"
    - "Expressway Ramp"
    - "Other Ramp"
    - "Laneway"
    - "Access Road"
    - "Busway"
  green_spaces: "data/raw/city_open_data/green_spaces/Green Spaces - 4326.geojson"
  ravine: "data/raw/city_open_data/ravine/RAVINE_BYLAW_WGS84.shp"
  # Lake Ontario is derived from the DTM's nodata (lidar returns nothing over water),
  # so the water edge matches the hillshade edge exactly. Keep only big polygons.
  water_from_hillshade: "data/processed/hillshade_3857.tif"
  water_min_area_m2: 50000

# ── Tiling ───────────────────────────────────────────────────────────────────
tiles:
  creeks_minzoom: 10
  creeks_maxzoom: 16
  hillshade_minzoom: 10
  hillshade_maxzoom: 16
  city_minzoom: 11
  city_maxzoom: 16

paths:
  interim:          "data/interim"
  processed:        "data/processed"
  bin:              "bin"
  site_public_data: "../site/public/data"
