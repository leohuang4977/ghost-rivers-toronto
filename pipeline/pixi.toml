# ─────────────────────────────────────────────────────────────
# Ghost Rivers of Toronto — offline GIS pipeline environment
# ─────────────────────────────────────────────────────────────
# Managed with pixi (https://pixi.sh): a single binary that resolves a
# conda-forge environment into a committed lockfile (pixi.lock). That lockfile
# is the reproducibility artifact for the "how I built this" case study — anyone
# can recreate the exact toolchain with `pixi install`.
#
# Why conda-forge (not pip): geopandas/rasterio/gdal are painful to pip-install
# on some platforms and trivial on conda-forge, which also ships a *prebuilt*
# linux `tippecanoe` — so the whole geostack + vector tiler comes from one lock,
# with no source builds.
#
# Platform is linux-64 only because this runs inside WSL2 (Ubuntu). tippecanoe
# has no supported native-Windows build; see docs/TOOLCHAIN.md for the rationale.

[workspace]
name = "ghost-rivers-pipeline"
version = "0.1.0"
description = "Clean historical hydrography, build a hillshade, and tile everything to PMTiles."
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.14"
geopandas = "*"
rasterio = "*"
gdal = "*"
shapely = "*"
pyproj = "*"
fiona = "*"
numpy = "*"
pyyaml = "*"
# Vector tiler (conda-forge ships a prebuilt linux binary):
tippecanoe = "*"

# ── Phase 1 pipeline — run order: creeks + hillshade -> tiles (or just `all`) ──
[tasks]
versions = "python --version && gdalinfo --version && tippecanoe --version"

# inputs/outputs let pixi skip a step when its code + config are unchanged and its
# output already exists, so `pixi run all` doesn't redo the expensive DTM mosaic.
[tasks.creeks]
cmd = "python -m ghost_rivers.clean_creeks"    # Step 1+2: geometry + year
env = { PYTHONPATH = "src" }
inputs = ["src/ghost_rivers/clean_creeks.py", "src/ghost_rivers/config.py", "config.yaml"]
outputs = ["data/processed/creeks_4326.geojson", "data/processed/creeks_meta.json"]

[tasks.hillshade]
cmd = "python -m ghost_rivers.hillshade"        # Step 3: DTM mosaic -> hillshade
env = { PYTHONPATH = "src" }
inputs = ["src/ghost_rivers/hillshade.py", "src/ghost_rivers/config.py", "src/ghost_rivers/_util.py", "config.yaml"]
outputs = ["data/processed/hillshade_3857.tif"]

[tasks.city]
cmd = "python -m ghost_rivers.city_layers"      # streets / parks / ravines / water
env = { PYTHONPATH = "src" }
depends-on = ["hillshade"]                       # water is derived from the hillshade nodata
inputs = ["src/ghost_rivers/city_layers.py", "src/ghost_rivers/config.py", "config.yaml", "data/processed/hillshade_3857.tif"]
outputs = ["data/interim/streets.geojson", "data/interim/street_labels.geojson", "data/interim/parks.geojson", "data/interim/ravines.geojson", "data/interim/water.geojson"]

[tasks.tiles]
cmd = "python -m ghost_rivers.tile"             # Step 4: -> PMTiles -> site/public/data
env = { PYTHONPATH = "src" }
depends-on = ["creeks", "hillshade", "city"]
inputs = ["src/ghost_rivers/tile.py", "src/ghost_rivers/config.py", "src/ghost_rivers/_util.py", "config.yaml", "data/processed/creeks_4326.geojson", "data/processed/hillshade_3857.tif", "data/interim/streets.geojson", "data/interim/street_labels.geojson", "data/interim/parks.geojson", "data/interim/ravines.geojson", "data/interim/water.geojson"]
outputs = ["data/processed/creeks.pmtiles", "data/processed/hillshade.pmtiles", "data/processed/city.pmtiles"]

[tasks.annex]
cmd = "python -m ghost_rivers.annexation"        # annexation parcels -> annexations.geojson
env = { PYTHONPATH = "src" }
inputs = ["src/ghost_rivers/annexation.py", "src/ghost_rivers/config.py", "config.yaml", "data/raw/annexation/extracted/AnnexationBounds1967.shp"]
outputs = ["../site/public/data/annexations.geojson"]

[tasks.all]
depends-on = ["creeks", "hillshade", "city", "tiles", "annex"]
